<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falling Frenzy — Catch the Falling Objects!</title>
  <meta name="description" content="A fast-paced arcade game where you catch falling objects and avoid bombs. Play now in your browser!" />
  <meta name="theme-color" content="#141428" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="controls-hint">
      <span>⌨️ Arrow keys / A D</span>
      <span>🖱️ Click & drag</span>
      <span>📱 Touch & drag</span>
      <span>⏸️ Escape to pause</span>
    </div>
  </main>
  <script type="module" src="js/game.js"></script>
</body>
</html>
